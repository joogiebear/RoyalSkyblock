# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Main Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#  Scalable per-island Skyblock on Advanced Slime Paper — one island = one slime
#  world, loaded on demand and unloaded when empty. Sections below are grouped by
#  system; reload most values with /is reload (world/storage changes need a restart).
# ═══════════════════════════════════════════════════════════════════════════════
#
#  CONFIG FILE MAP — RoyalSkyblock splits settings, text, and content:
#    config.yml       this file — storage, world backend, island gen, currencies,
#                     coop, spawn, flow limiter, teleport
#    messages.yml     every player-facing string (& colours, %tokens%)
#    bank.yml         the built-in bank: levels, interest, upgrade costs
#    levels.yml       island-level block values, scan tuning, level-up rewards
#    upgrades.yml     island upgrades (size / guest limit / coop slots)
#    perks.yml        OPTIONAL level-gated perks (off by default)
#    gamemodes/*.yml  Solo / Coop / Ironman rulesets
#    gui/<cat>/*.yml  one file per menu, grouped into folders:
#                     core / profile / island / coop / bank / level
#    Reload ALL of the above with /is reload.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Island storage ───────────────────────────────────────────────────────────
# Where island METADATA lives (owner, members, level, upgrades). This is the same
# dual-dialect layer used across the Royal suite. The island BLOCKS live in the
# slime data-source below, not here.
storage:
  # sqlite (default, zero-setup) or mysql (recommended for a network).
  type: sqlite
  # SQLite database file name (under the plugin folder).
  sqlite-file: islands.db
  mysql:
    host: localhost
    port: 3306
    database: royalskyblock
    username: root
    password: ""
    pool-size: 10
    # JDBC properties appended to the connection URL (query-string form, same as the rest of the suite).
    properties: "useSSL=false&characterEncoding=utf8"

# ── World backend (Advanced Slime Paper) ─────────────────────────────────────
world:
  # The ASP data-source islands are stored in. Must be a loader ASP has registered:
  #   file   — flat .slime files under the ASP world folder (single server only)
  #   mysql  — slime blobs in MySQL   (recommended: shardable across a network)
  #   mongo  — slime blobs in MongoDB
  # For a multi-server network use "mysql" (or "mongo") so any server can load any island.
  slime-data-source: file

  # Islands are named "<prefix><owner-uuid>" in the data source.
  world-name-prefix: "island_"

  # Keep an island world loaded this long (seconds) after its last player leaves before unloading it
  # back to the data source. 0 = unload as soon as it empties. The grace period means a hub round-trip
  # or a quick relog doesn't pay the save/load cost twice.
  #
  # An unloaded island does not tick: no crop growth, no furnaces, no mobs, no minions. That is the
  # whole point — the server only pays for islands someone is standing on — and the time it missed is
  # paid back on the next visit by the simulation section below.
  unload-grace-seconds: 60

  # How many islands may be unloaded in one pass (the check runs every 5 seconds).
  # Unloading halts a world's chunk system and I/O on the main thread — milliseconds each, but a
  # server-wide logout would otherwise try to halt every island in a single tick. Longest-empty go
  # first, the rest wait for the next pass.
  max-unloads-per-tick: 2

  # Default world properties applied to every new island world.
  properties:
    difficulty: normal          # peaceful | easy | normal | hard
    allow-monsters: true
    allow-animals: true
    pvp: false
    environment: normal         # normal | nether | end
    world-type: default
    default-biome: minecraft:plains

# ── Islands ──────────────────────────────────────────────────────────────────
island:
  # Where inside the island world the schematic origin (or generated starter) is pasted.
  paste:
    x: 0
    y: 100
    z: 0

  # Where a fresh island's home sits, relative to the paste origin above.
  home-offset:
    x: 0
    y: 1
    z: 0
    yaw: 0
    pitch: 0

  # Starting protection radius (blocks from island centre). The island-size upgrade raises this.
  starting-radius: 80

  # Base number of guests that can /visit at once (before the guest-limit upgrade adds more).
  base-guest-limit: 3

  # Max members on a fresh island (owner counts as one). Upgradeable in Phase 3.
  starting-member-limit: 4

  # Cooldown (seconds) between an island reset and the next allowed reset.
  reset-cooldown-seconds: 300

  # The starter island that gets built for a new player.
  starter:
    # A schematics/<name>.schem file (standard WorldEdit/Sponge format) pasted via WorldEdit or FAWE
    # when installed. If neither is present, or the file is missing, the built-in generator below is
    # used instead. Save one in-game with: /is admin schematic save <name>
    schematic: default
    # ── Built-in generator (fallback when there's no schematic) ──
    # Generates a grass platform with a cozy oak starter hut (door, windows, roof, and a bed +
    # crafting table + furnace + lantern inside — the starter chest sits in its back corner), an
    # oak tree, a contained pond, a hydrated crop farm (wheat/carrots/potatoes/beetroot), and sugar cane.
    platform-radius: 6           # 6 => a 13x13 platform (minimum 6 to fit the hut + features)
    platform-block: GRASS_BLOCK  # top surface
    sub-block: DIRT              # two layers beneath the surface
    tree: true                  # plant a starter oak
    bedrock-anchor: true        # a bedrock block under the centre
    chest:
      enabled: true             # set false to skip the starter chest entirely
      # Starter chest contents. One per line as MATERIAL:AMOUNT (vanilla material names).
      items:
        - "ICE:2"
        - "LAVA_BUCKET:1"
        - "OAK_SAPLING:2"
        - "MELON_SLICE:1"
        - "PUMPKIN_SEEDS:1"
        - "SUGAR_CANE:1"
        - "BONE_MEAL:4"

  # A visible world border at the island edge (radius above). Keeps players on their island.
  # The island border scales with island size and is enforced PER-PLAYER, so players with
  # royalskyblock.bypass (admins) pass through it while everyone else is kept on-island.
  border:
    enabled: true
    # Border colour: blue | red | green | off. Change live with /is admin border <colour>.
    # (Minecraft derives border colour from motion, so these are faked with an imperceptible
    # perpetual lerp. 'off' shows no border.)
    color: blue
    warning-blocks: 2           # red screen vignette this many blocks before the edge
    # Log where the border applies/clears per player (troubleshooting "I don't see a border").
    debug: false

  # ── World rules (gamemode + gamerules for every island) ──────────────────────
  # Island worlds are created on demand and are NOT managed by Multiverse, so RoyalSkyblock
  # applies these itself — gamerules when an island loads, the gamemode when a player enters
  # one. Everything here is editable; nothing is hardcoded.
  world-rules:
    # Minecraft gamemode players are put in while on an island: survival | adventure | creative
    # | spectator. (This is the MC gamemode — separate from a profile's Solo/Coop/Ironman type.)
    # Set enforce-gamemode false to leave gamemode untouched. Give staff/builders the
    # royalskyblock.playmode.bypass permission so they can stay in creative, etc.
    enforce-gamemode: true
    gamemode: survival
    # Gamerules set on every island world when it loads. Keys accept the Minecraft 26.2 ids
    # (keep_inventory), the classic names (keepInventory), or a minecraft: prefix — all resolve.
    # Add or remove ANY valid gamerule freely; unknown names are skipped with a warning.
    gamerules:
      keep_inventory: true              # don't drop items on death
      mob_griefing: false               # creepers/endermen don't wreck the island
      advance_weather: false            # no rain
      show_advancement_messages: false  # no "made the advancement" spam
      # Deliberately left at vanilla defaults (uncomment to override):
      #   advance_time: true            # islands cycle day/night
      #   fall_damage: true             # survival — fall damage applies
      #   spawn_monsters: true          # mobs spawn on unlit islands at night

  # ── Void protection ──────────────────────────────────────────────────────────
  # Falling off an island normally means slow vanilla void-damage ticks — and the higher
  # your max health climbs, the longer it drags. Instead, catch the fall below 'below-y'.
  void:
    enabled: true
    # Y treated as "the void". Islands paste at y≈100 (world floor is -64), so anything
    # well below the island is safe. Raise it to catch the fall sooner — but keep it under
    # anything players build or mine down to, or they'd be yanked up mid-build.
    below-y: 0
    # What happens when a player drops below below-y on an island:
    #   teleport - pull them back to the island home (recommended — no slow death)
    #   kill     - kill instantly (still respects keep_inventory) instead of ticking down
    #   none     - leave vanilla void behaviour alone
    action: teleport
    # Damage dealt on a teleport rescue, in hearts. 0 = no penalty. (kill/none ignore this.)
    damage: 0
    # Chat line shown on rescue (& colour codes; leave blank for silent).
    message: "&cYou fell into the void and were pulled back to your island."

# ── Profiles (Hypixel-style saves: each has its own island, inventory & progression) ─
profiles:
  # How many profiles a player may have.
  max-profiles: 3

# ── Coop (shared-island profiles) ─────────────────────────────────────────────
coop:
  # Max members on a Coop profile, including the owner.
  max-members: 4
  # How long a coop invite stays valid before it expires.
  invite-timeout-seconds: 60

  # Shared coop bank. Backed by RoyalBank's shared-account API when RoyalBank is installed, otherwise a
  # Vault-backed balance RoyalSkyblock owns. Needs an economy (Vault) either way.
  bank:
    # Preset deposit/withdraw amount buttons in the coop-bank GUI (first three are shown).
    amounts:
      - 100
      - 1000
      - 10000
    # Cap for the Vault-backed store. -1 = unlimited. (The RoyalBank backend uses its own
    # shared-accounts.max-balance instead.)
    max-balance: -1
    # Require owner/co-owner to withdraw? Deposits are always open to members.
    withdraw-requires-manager: false

# ── Currencies (used by upgrade costs) ────────────────────────────────────────
# Define named currencies; upgrades reference them by key. Two kinds:
#   type: vault    -> your server's Vault economy (works with any economy plugin).
#   type: command  -> ANYTHING ELSE. Affordability is checked with a PlaceholderAPI balance placeholder;
#                     charging/refunding run console commands. %player% and %amount% are substituted.
#                     This makes any currency plug in: EcoBits gems, PlayerPoints, a token plugin, an
#                     item/block economy — anything that exposes a balance placeholder + give/take command.
#
# Define as many currencies as you like, then point each upgrade at one with `currency:` in upgrades.yml
# (and the bank uses Vault). 'coins' (Vault) is the DEFAULT so upgrades work out of the box on any Vault
# server; the rest below are EXAMPLES — keep, edit, or delete them to match what your server runs.
currencies:
  coins:
    type: vault
    display-name: "coins"

  # EcoBits gems (needs EcoBits + PlaceholderAPI). IMPORTANT: replace "gems" below with YOUR
  # EcoBits currency id (the `id:` in EcoBits/config.yml — often e.g. "skyblockgem"), in all three
  # places. EcoBits syntax is: ecobits <give|take> <player> <currency-id> <amount>.
  gems:
    type: command
    display-name: "gems"
    balance-placeholder: "%ecobits_gems%"
    take-command: "ecobits take %player% gems %amount%"
    give-command: "ecobits give %player% gems %amount%"

  # More examples — uncomment/edit for your setup:
  #
  # PlayerPoints:
  #   tokens:
  #     type: command
  #     display-name: "tokens"
  #     balance-placeholder: "%playerpoints_points%"
  #     take-command: "points take %player% %amount%"
  #     give-command: "points give %player% %amount%"
  #
  # Any placeholder + command currency (blocks, crystals, whatever your plugin exposes):
  #   crystals:
  #     type: command
  #     display-name: "crystals"
  #     balance-placeholder: "%yourplugin_crystals%"
  #     take-command: "yourplugin take %player% crystals %amount%"
  #     give-command: "yourplugin give %player% crystals %amount%"

# ── Spawn / hub (where players go when they leave or lose an island) ──────────
# When a player's island is deleted (and later: when they leave one, or an island
# unloads out from under them), they are sent here. Point `world` at whatever world
# you use as your hub — "hub", "spawn", "world", anything you run.
spawn:
  world: world
  # Route players to this spawn on JOIN and on death (bedless respawns), unless they logged out on
  # their own island. Beds / respawn anchors are respected. Turn off if another plugin manages spawns.
  teleport-on-join: true
  # Use that world's own spawn point. Set false to use the explicit coordinates below.
  use-world-spawn: true
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# ── Offline simulation (catch-up) ─────────────────────────────────────────────
# Islands unload when empty (see world.unload-grace-seconds), so nothing on them ticks while the
# owner is away. On the next visit RoyalSkyblock fast-forwards what that time should have produced.
#
# Crops are handled natively below. ANYTHING ELSE that should catch up — minions especially — hooks
# the IslandCatchupEvent API instead of being configured here; it receives the island, the world and
# the (already-clamped) offline seconds, and pays its own dues. That keeps RoyalSkyblock from needing
# to know a minion plugin exists.
simulation:
  enabled: true

  # Never simulate more than this many hours, however long the island actually sat unloaded.
  # Crops self-cap (they can only reach ripe), so this mainly bounds what minion-style listeners are
  # told — otherwise an island untouched for a year would mint a year of output on one login.
  # 0 = no cap (not recommended once minions are in).
  max-offline-hours: 24

  # Vertical band the scan walks, shared by every simulator. Islands paste at y=100, so this covers
  # the buildable area without walking all 384 blocks of world height on every visit.
  scan-y-min: 60
  scan-y-max: 180

  crops:
    enabled: true
    # Expected real seconds for one growth stage on a normal (hydrated, lit) farm. Vanilla grows crops
    # on random ticks, so this is an average, not a schedule: each stage is rolled independently, which
    # is why a field planted together still ripens unevenly. ~130s ≈ vanilla wheat's ~15 min to ripe.
    # Lower = more generous catch-up.
    seconds-per-stage: 130
    # Covers the age-based crops: wheat, carrots, potatoes, beetroot, nether wart, cocoa, berries.

  # Sugar cane and cactus — the backbone of most skyblock farms. These don't ripen, they stack, so
  # they're tuned per BLOCK grown rather than per growth stage.
  stacking-plants:
    enabled: true
    # Expected real seconds to add one block to a column. Vanilla cane/cactus grow roughly every
    # 18 minutes on average; lower this to be more generous.
    seconds-per-block: 1080
    # Tallest a column may reach. Vanilla is 3. Growth never places into anything but air, so a farm
    # built under a ceiling stays under its ceiling regardless of this.
    max-height: 3

  # NOTE: melon/pumpkin stems and saplings are NOT simulated — stems spawn fruit in a neighbouring
  # block and saplings generate a whole tree, both of which can overwrite what a player built. They
  # still grow normally while someone is on the island.

# ── EcoMobs strength bridge (optional; only active if EcoMobs is installed) ────
# Scales EcoMobs custom mobs' health and damage by the level of the island they spawn on. EcoMobs
# can't read island level in its OWN spawn conditions (it evaluates them against a location with no
# player, so %royalskyblock_island_level% won't resolve there) — so RoyalSkyblock does it after the
# mob spawns, reading the level straight from its island world. No effect off an island.
ecomobs:
  enabled: true
  # multiplier = 1 + island_level * scale, clamped to [1, max-multiplier]. Island level is a sum of
  # block values (reaches the hundreds/thousands), so these are per-point and small. At 0.002 a
  # level-500 island makes mobs 2x tougher. Damage scales slower than health by default, so higher
  # islands get tankier without becoming one-shot machines — tune to taste.
  health-scale-per-level: 0.002
  damage-scale-per-level: 0.0015
  max-multiplier: 5.0

# ── Island mob spawning (optional; needs a mob provider like EcoMobs) ──────────
# RoyalSkyblock spawns night mobs on islands and picks the tier from the player's Combat skill.
# It's PLAYER-DRIVEN — each pass only looks at online players on islands, never scans every island —
# so it's cheap and never keeps an island loaded. It spawns via the provider's API (SpawnReason COMMAND),
# so turn OFF vanilla hostiles on islands with the spawn_monsters gamerule (island.world-rules) to avoid
# doubling up. Per-island toggle: the MOB_SPAWNS island setting (on by default).
island-mobs:
  enabled: false                 # off until your provider mobs are configured
  provider: ecomobs              # ecomobs (mythicmobs / leveledmobs can be added later)
  combat-skill: combat           # EcoSkills skill id that sets the tier
  scan-interval-ticks: 200       # how often a spawn pass runs (200 = every 10s)
  only-night: true               # only spawn during the night
  first-night-grace-ticks: 24000 # no spawns until an island is this old (24000 = 1 MC day)
  require-low-light: true
  max-light-level: 7
  require-member-present: true    # a visitor alone on an island won't trigger spawns
  owner-combat-level: false       # false = scale to the present player; true = always the island owner
  combat-level-cap: 15            # tier is min(combat level, this)
  spawn-radius-min: 12            # spawn between this and max blocks from the player
  spawn-radius-max: 28
  max-mobs-per-island: 12         # our tagged mobs alive on an island at once
  max-spawns-per-scan-per-island: 3
  spawn-attempts: 6               # tries to find a valid spot per spawn (bounded — no island scan)
  debug: false
  # Intimidation: island mobs whose tier is at or below a player's Intimidation stat ignore them.
  # The Talismans intimidation chain only GRANTS the stat (add_stat) and the stat has no effects of
  # its own — this bridge is what acts on it. Only mobs RoyalSkyblock spawned are affected.
  intimidation:
    enabled: true
    stat: intimidation           # EcoSkills stat id the talismans grant
    # Ignore level = min(combat level, stat) — the formula in the talismans' own descriptions.
    # Set false to use the raw stat regardless of the player's Combat level.
    cap-to-combat-level: true

  # Mob id looked up in the provider. %family% and %level% are filled in — e.g. private_island_zombie_7.
  mob-id-format: "private_island_%family%_%level%"
  # Weighted families to pick from. Each needs matching provider mobs <family>_1 .. <family>_<cap>.
  families:
    zombie:      { weight: 35, enabled: true }
    skeleton:    { weight: 25, enabled: true }
    spider:      { weight: 15, enabled: true }
    cave_spider: { weight: 8,  enabled: true }
    slime:       { weight: 8,  enabled: true }
    enderman:    { weight: 6,  enabled: true }
    witch:       { weight: 3,  enabled: true }

# ── Anti-crash: liquid flow limiter ───────────────────────────────────────────
flow-limiter:
  enabled: true
  # Max water/lava flow events per world per second before further flow is blocked for the rest of
  # that second. Defuses lag machines (someone flooding an island to crash the server). Each island
  # is its own world, so this budget is effectively per-island.
  max-per-second: 800
  # When a player with royalskyblock.bypass empties a bucket in a world, the limiter is paused there
  # for this many seconds — so admin/builder liquid work isn't throttled.
  admin-bypass-seconds: 30

# ── Teleport safety ──────────────────────────────────────────────────────────
teleport:
  # Scan upward for a safe (non-suffocating, solid-footed) spot before dropping a
  # player at a home/visit location. If none is found within this many blocks, fall
  # back to the raw location.
  safe-scan-height: 8

# ── Messages / misc ──────────────────────────────────────────────────────────
settings:
  # Seconds a chat prompt (e.g. naming an island) waits for input before giving up.
  chat-prompt-timeout-seconds: 30
  # Emit anonymous usage stats via bStats.
  bstats: true
  # Print extra timing/debug lines to console.
  debug: false
