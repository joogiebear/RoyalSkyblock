# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Main Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#  Scalable per-island Skyblock on Advanced Slime Paper — one island = one slime
#  world, loaded on demand and unloaded when empty. Sections below are grouped by
#  system; reload most values with /is reload (world/storage changes need a restart).
# ═══════════════════════════════════════════════════════════════════════════════
#
#  CONFIG FILE MAP — RoyalSkyblock splits settings, text, and content:
#    config.yml       this file — storage, world backend, island gen, currencies,
#                     coop, spawn, flow limiter, teleport
#    messages.yml     every player-facing string (& colours, %tokens%)
#    bank.yml         the built-in bank: levels, interest, upgrade costs
#    levels.yml       island-level block values, scan tuning, level-up rewards
#    upgrades.yml     island upgrades (size / guest limit / coop slots)
#    gamemodes/*.yml  Solo / Coop / Ironman rulesets
#    gui/<cat>/*.yml  one file per menu, grouped into folders:
#                     core / profile / island / coop / bank / level
#    Reload ALL of the above with /is reload.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Island storage ───────────────────────────────────────────────────────────
# Where island METADATA lives (owner, members, level, upgrades). This is the same
# dual-dialect layer used across the Royal suite. The island BLOCKS live in the
# slime data-source below, not here.
storage:
  # sqlite (default, zero-setup) or mysql (recommended for a network).
  type: sqlite
  # SQLite database file name (under the plugin folder).
  sqlite-file: islands.db
  mysql:
    host: localhost
    port: 3306
    database: royalskyblock
    username: root
    password: ""
    pool-size: 10
    # JDBC properties appended to the connection URL (query-string form, same as the rest of the suite).
    properties: "useSSL=false&characterEncoding=utf8"

# ── World backend (Advanced Slime Paper) ─────────────────────────────────────
world:
  # The ASP data-source islands are stored in. Must be a loader ASP has registered:
  #   file   — flat .slime files under the ASP world folder (single server only)
  #   mysql  — slime blobs in MySQL   (recommended: shardable across a network)
  #   mongo  — slime blobs in MongoDB
  # For a multi-server network use "mysql" (or "mongo") so any server can load any island.
  slime-data-source: file

  # Islands are named "<prefix><owner-uuid>" in the data source.
  world-name-prefix: "island_"

  # Keep an island world loaded this long (seconds) after its last player leaves
  # before unloading it back to the data source. 0 = unload immediately.
  unload-grace-seconds: 60

  # Default world properties applied to every new island world.
  properties:
    difficulty: normal          # peaceful | easy | normal | hard
    allow-monsters: true
    allow-animals: true
    pvp: false
    environment: normal         # normal | nether | end
    world-type: default
    default-biome: minecraft:plains

# ── Islands ──────────────────────────────────────────────────────────────────
island:
  # Where inside the island world the schematic origin (or generated starter) is pasted.
  paste:
    x: 0
    y: 100
    z: 0

  # Where a fresh island's home sits, relative to the paste origin above.
  home-offset:
    x: 0
    y: 1
    z: 0
    yaw: 0
    pitch: 0

  # Starting protection radius (blocks from island centre). The island-size upgrade raises this.
  starting-radius: 80

  # Base number of guests that can /visit at once (before the guest-limit upgrade adds more).
  base-guest-limit: 3

  # Max members on a fresh island (owner counts as one). Upgradeable in Phase 3.
  starting-member-limit: 4

  # Cooldown (seconds) between an island reset and the next allowed reset.
  reset-cooldown-seconds: 300

  # The starter island that gets built for a new player.
  starter:
    # A schematics/<name>.schem file (standard WorldEdit/Sponge format) pasted via WorldEdit or FAWE
    # when installed. If neither is present, or the file is missing, the built-in generator below is
    # used instead. Save one in-game with: /is admin schematic save <name>
    schematic: default
    # ── Built-in generator (fallback when there's no schematic) ──
    # Generates a grass platform with two oak trees, a contained pond, a hydrated crop farm
    # (wheat/carrots/potatoes/beetroot), sugar cane, and the starter chest below.
    platform-radius: 6           # 6 => a 13x13 platform (minimum 6 to fit the features)
    platform-block: GRASS_BLOCK  # top surface
    sub-block: DIRT              # two layers beneath the surface
    tree: true                  # plant a starter oak
    bedrock-anchor: true        # a bedrock block under the centre
    chest:
      enabled: true             # set false to skip the starter chest entirely
      # Starter chest contents. One per line as MATERIAL:AMOUNT (vanilla material names).
      items:
        - "ICE:2"
        - "LAVA_BUCKET:1"
        - "OAK_SAPLING:2"
        - "MELON_SLICE:1"
        - "PUMPKIN_SEEDS:1"
        - "SUGAR_CANE:1"
        - "BONE_MEAL:4"

  # A visible world border at the island edge (radius above). Keeps players on their island.
  border:
    enabled: true
    warning-blocks: 2           # red vignette this many blocks before the edge

# ── Profiles (Hypixel-style saves: each has its own island, inventory & progression) ─
profiles:
  # How many profiles a player may have.
  max-profiles: 3

# ── Coop (shared-island profiles) ─────────────────────────────────────────────
coop:
  # Max members on a Coop profile, including the owner.
  max-members: 4
  # How long a coop invite stays valid before it expires.
  invite-timeout-seconds: 60

  # Shared coop bank. Backed by RoyalBank's shared-account API when RoyalBank is installed, otherwise a
  # Vault-backed balance RoyalSkyblock owns. Needs an economy (Vault) either way.
  bank:
    # Preset deposit/withdraw amount buttons in the coop-bank GUI (first three are shown).
    amounts:
      - 100
      - 1000
      - 10000
    # Cap for the Vault-backed store. -1 = unlimited. (The RoyalBank backend uses its own
    # shared-accounts.max-balance instead.)
    max-balance: -1
    # Require owner/co-owner to withdraw? Deposits are always open to members.
    withdraw-requires-manager: false

# ── Currencies (used by upgrade costs) ────────────────────────────────────────
# Define named currencies; upgrades reference them by key. Two kinds:
#   type: vault    -> your server's Vault economy (works with any economy plugin)
#   type: command  -> universal: read the balance from a PlaceholderAPI placeholder for the
#                     affordability check, and charge with a console command. %player% and %amount%
#                     are substituted. Works with EcoBits gems, any currency plugin, even block/item
#                     costs (via a command that removes them).
#
# 'coins' (Vault) is the DEFAULT that upgrades.yml uses, so upgrades work out of the box with just
# Vault. 'gems' below is an OPTIONAL example command-currency (EcoBits) — it only works if you run
# EcoBits (or you edit its commands/placeholder). To charge gems for an upgrade, set that upgrade's
# `currency: gems` in upgrades.yml.
currencies:
  coins:
    type: vault
    display-name: "coins"
  gems:
    type: command
    display-name: "gems"
    balance-placeholder: "%ecobits_gems%"
    take-command: "ecobits remove %player% %amount% gems"
    give-command: "ecobits give %player% %amount% gems"

# ── Spawn / hub (where players go when they leave or lose an island) ──────────
# When a player's island is deleted (and later: when they leave one, or an island
# unloads out from under them), they are sent here. Point `world` at whatever world
# you use as your hub — "hub", "spawn", "world", anything you run.
spawn:
  world: world
  # Use that world's own spawn point. Set false to use the explicit coordinates below.
  use-world-spawn: true
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# ── Anti-crash: liquid flow limiter ───────────────────────────────────────────
flow-limiter:
  enabled: true
  # Max water/lava flow events per world per second before further flow is blocked for the rest of
  # that second. Defuses lag machines (someone flooding an island to crash the server). Each island
  # is its own world, so this budget is effectively per-island.
  max-per-second: 800
  # When a player with royalskyblock.bypass empties a bucket in a world, the limiter is paused there
  # for this many seconds — so admin/builder liquid work isn't throttled.
  admin-bypass-seconds: 30

# ── Teleport safety ──────────────────────────────────────────────────────────
teleport:
  # Scan upward for a safe (non-suffocating, solid-footed) spot before dropping a
  # player at a home/visit location. If none is found within this many blocks, fall
  # back to the raw location.
  safe-scan-height: 8

# ── Messages / misc ──────────────────────────────────────────────────────────
settings:
  # Seconds a chat prompt (e.g. naming an island) waits for input before giving up.
  chat-prompt-timeout-seconds: 30
  # Emit anonymous usage stats via bStats.
  bstats: true
  # Print extra timing/debug lines to console.
  debug: false
