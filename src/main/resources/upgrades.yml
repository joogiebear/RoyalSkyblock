# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock — Upgrades
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Each top-level key (size, guest-limit, coop-slots, ...) is one upgrade track.
#  Add, remove, or retune freely — the upgrades menu renders whatever is here.
#
#  Per upgrade:
#    display-name : shown in the menu (supports & colour codes)
#    icon         : the menu item
#    description  : one-line summary shown in the icon lore
#    effect       : what a tier changes —
#                     radius       -> island size (world-border half-size)
#                     guest_slots  -> extra concurrent /visit guests
#                     coop_slots   -> extra coop members
#
#  Per tier (1, 2, 3, ...):
#    value      : the effect number at that tier (a radius, or a +slots amount)
#    cost       : pay this, then wait `time` for the upgrade to finish
#    skip-cost  : pay this instead to finish instantly
#    time       : the wait — 2d / 4h / 30m / 45s / 0   (0 = instant)
#
#  A cost / skip-cost is a currency + amount, where `currency` is a key from the
#  `currencies:` section of config.yml. These upgrades use `coins` (your Vault
#  economy) by default, so they work out of the box. Switch any `currency:` to
#  `gems` (or another currency you define in config.yml) to charge that instead:
#
#      cost:
#        currency: coins
#        amount: 175
#
#  Part of the RoyalSkyblock config set — see config.yml for the full file map.
# ═══════════════════════════════════════════════════════════════════════════════

