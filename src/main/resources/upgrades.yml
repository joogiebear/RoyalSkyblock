# ┌──────────────────────────────────────────────────────────────────────────┐
# │  RoyalSkyblock — upgrades                                                  │
# │  Each upgrade has an effect + ordered tiers. A tier is bought by paying    │
# │  `cost` and waiting `time`, OR paying `skip-cost` to finish instantly.     │
# │  `currency` values reference the config `currencies:` section (coins/gems).│
# │  time: 2d / 4h / 30m / 45s / 0 (0 or omitted = instant).                   │
# └──────────────────────────────────────────────────────────────────────────┘

size:
  display-name: "&a&lIsland Size"
  icon: grass_block
  description: "Expand your island by adding buildable space on each side."
  effect: radius            # value = island radius (world border half-size)
  tiers:
    1:  { value: 84,  cost: { currency: gems, amount: 0 },   skip-cost: { currency: gems, amount: 144 }, time: 2d }
    2:  { value: 88,  cost: { currency: gems, amount: 175 }, skip-cost: { currency: gems, amount: 288 }, time: 4d }
    3:  { value: 92,  cost: { currency: gems, amount: 175 }, skip-cost: { currency: gems, amount: 432 }, time: 6d }
    4:  { value: 96,  cost: { currency: gems, amount: 175 }, skip-cost: { currency: gems, amount: 576 }, time: 8d }
    5:  { value: 100, cost: { currency: gems, amount: 175 }, skip-cost: { currency: gems, amount: 720 }, time: 10d }
    6:  { value: 104, cost: { currency: gems, amount: 175 }, skip-cost: { currency: gems, amount: 720 }, time: 10d }
    7:  { value: 108, cost: { currency: gems, amount: 200 }, skip-cost: { currency: gems, amount: 720 }, time: 10d }
    8:  { value: 112, cost: { currency: gems, amount: 200 }, skip-cost: { currency: gems, amount: 720 }, time: 10d }
