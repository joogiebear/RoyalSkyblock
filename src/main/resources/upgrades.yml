  tiers:
    1: { value: 1, cost: { currency: gems, amount: 0 },  skip-cost: { currency: gems, amount: 288 },  time: 2d }
    2: { value: 2, cost: { currency: gems, amount: 50 }, skip-cost: { currency: gems, amount: 576 },  time: 4d }
    3: { value: 3, cost: { currency: gems, amount: 50 }, skip-cost: { currency: gems, amount: 864 },  time: 6d }
    4: { value: 4, cost: { currency: gems, amount: 50 }, skip-cost: { currency: gems, amount: 1152 }, time: 8d }
    5: { value: 5, cost: { currency: gems, amount: 50 }, skip-cost: { currency: gems, amount: 2304 }, time: 16d }

coop-slots:
  display-name: "&d&lCoop Slots"
  icon: cyan_bed
  description: "Add extra members you can invite to this profile."
  effect: coop_slots        # value = extra coop members
  tiers:
    1: { value: 1, cost: { currency: gems, amount: 600 }, skip-cost: { currency: gems, amount: 0 }, time: 0 }
    2: { value: 2, cost: { currency: gems, amount: 600 }, skip-cost: { currency: gems, amount: 0 }, time: 0 }
