# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Coop Members
# ═══════════════════════════════════════════════════════════════════════════════
#  The 0 slots fill at runtime with your coop roster (owner first). Owner/co-owner
#  click a member's head to remove them. Invite opens the player picker; Leave
#  removes you from the profile.
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
#    slot options: silent: true — suppress this menu’s click sound for one slot, for a
#      button whose destination plays its own open sound (the two land together otherwise)
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8Skyblock &7» &fCoop"
rows: 6

# Sounds this menu plays. Delete a key to silence it, or set enabled: false.
#   open  - when the menu is opened
#   click - when a button is clicked
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  click:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "100000001"   # 0 = a member head (filled dynamically)
        - "100000001"
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  # ── bank ──
  - item: gold_ingot name:"&6&lBank"
    lore:
      - "&7Your personal bank and the"
      - "&7shared coop bank."
      - ""
      - "&eClick to open!"
    row: 5
    column: 5
    left-click:
      - id: open_menu
        args:
          menu: bank-hub

  # ── footer ──
  - item: lime_dye name:"&a&lInvite Player"
    lore:
      - "&7Invite an online player to"
      - "&7your coop island."
      - ""
      - "&eClick to pick someone!"
    row: 6
    column: 2
    left-click:
      - id: open_menu
        args:
          menu: coop-invite

  - item: arrow name:"&7« Back"
    lore:
      - "&7Return to Manage Island."
    row: 6
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: manage

  - item: barrier name:"&cClose"
    lore:
      - "&7Close this menu."
    row: 6
    column: 6
    left-click:
      - id: close

  - item: oak_door name:"&c&lLeave Coop"
    lore:
      - "&7Remove yourself from this"
      - "&7coop profile."
      - ""
      - "&eClick to leave!"
    row: 6
    column: 8
    left-click:
      - id: player_command
        args:
          command: "is leave"
