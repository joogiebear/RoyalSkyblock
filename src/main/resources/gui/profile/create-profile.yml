# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  New Profile
# ═══════════════════════════════════════════════════════════════════════════════
#  Pick a gamemode. Each button runs `is profile create <mode>`, which creates the
#  profile and its island, then switches you to it.
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8Skyblock &7» &fNew Profile"
rows: 3

# Sounds this menu plays. Delete a key to silence it, or set enabled: false.
#   open  - when the menu is opened
#   click - when a button is clicked
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  click:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  # ── gamemodes ──
  - item: grass_block name:"&a&lSOLO"
    lore:
      - "&7Classic Skyblock — trade, sell,"
      - "&7and build freely."
      - ""
      - "&eClick to create!"
    row: 2
    column: 3
    left-click:
      - id: player_command
        args:
          command: "is profile create solo"

  - item: player_head name:"&b&lCOOP"
    lore:
      - "&7Share one island and economy"
      - "&7with friends."
      - ""
      - "&eClick to create!"
    row: 2
    column: 5
    left-click:
      - id: player_command
        args:
          command: "is profile create coop"

  - item: iron_block name:"&f&lIRONMAN"
    lore:
      - "&7Fully self-sufficient — no auction"
      - "&7house, bazaar, or trading."
      - ""
      - "&eClick to create!"
    row: 2
    column: 7
    left-click:
      - id: player_command
        args:
          command: "is profile create ironman"

  # ── footer ──
  - item: arrow name:"&7« Back"
    lore:
      - "&7Return to your profiles."
    row: 3
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: profiles

  - item: barrier name:"&cClose"
    lore:
      - "&7Close this menu."
    row: 3
    column: 6
    left-click:
      - id: close
