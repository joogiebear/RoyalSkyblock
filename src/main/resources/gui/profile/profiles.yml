# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Profiles
# ═══════════════════════════════════════════════════════════════════════════════
#  Switch between your profiles. The 0 slots fill at runtime with one icon per
#  profile (Solo / Coop / Ironman); click an icon to switch to it.
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
#    slot options: silent: true — suppress this menu’s click sound for one slot, for a
#      button whose destination plays its own open sound (the two land together otherwise)
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8Skyblock &7» &fProfiles"
rows: 5

# Sounds this menu plays. Delete a key to silence it, or set enabled: false.
#   open  - when the menu is opened
#   click - when a button is clicked
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  click:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "100000001"   # 0 = a profile icon (filled dynamically)
        - "111111111"
        - "111111111"

slots:
  # ── footer ──
  - item: arrow name:"&7« Back"
    lore:
      - "&7Return to the main menu."
    row: 5
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: main

  - item: nether_star name:"&a&lCreate New Profile"
    lore:
      - "&7Start a fresh profile — its own"
      - "&7island, inventory, and progression."
      - ""
      - "&eClick to create!"
    row: 5
    column: 5
    left-click:
      - id: open_menu
        args:
          menu: create-profile

  - item: barrier name:"&cClose"
    lore:
      - "&7Close this menu."
    row: 5
    column: 6
    left-click:
      - id: close
