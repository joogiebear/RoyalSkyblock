# ┌──────────────────────────────────────────────────────────────────────────┐
# │  RoyalSkyblock — island settings                                          │
# │  The 0 slots are filled at runtime with one toggle per island setting;     │
# │  clicking one flips it (owner/co-owner only).                              │
# └──────────────────────────────────────────────────────────────────────────┘

title: "&6&lIsland Settings"
rows: 3

pages:
  - page: 1
    mask:
      items:
        - gray_stained_glass_pane
      pattern:
        - "111111111"
        - "100000001"   # 0 = a setting toggle (filled dynamically)
        - "111111111"

slots:
  - item: arrow name:"&7« Back"
    row: 3
    column: 1
    left-click:
      - id: open_menu
        args:
          menu: main
