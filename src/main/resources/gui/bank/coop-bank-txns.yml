# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Coop Bank — Transactions
# ═══════════════════════════════════════════════════════════════════════════════
#  The 0 slots fill at runtime with the coop bank's recent ledger entries (newest
#  first). Only available with the RoyalBank backend; the Vault fallback has no ledger.
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
# ═══════════════════════════════════════════════════════════════════════════════

title: "&6&lCoop Bank Ledger"
rows: 6

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "100000001"
        - "100000001"
        - "100000001"
        - "111111111"
        - "111111111"

slots:
  # (a dynamic « Back at row 6, col 4 is placed by code — it returns to the right bank)
  - item: barrier name:"&c&lClose"
    lore:
      - "&7Close this menu."
    row: 6
    column: 6
    left-click:
      - id: close
