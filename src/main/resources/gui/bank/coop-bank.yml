# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Coop Bank
# ═══════════════════════════════════════════════════════════════════════════════
#  A shared balance for the coop. Backed by RoyalBank's shared-account API when
#  RoyalBank is installed, otherwise a Vault-backed store RoyalSkyblock owns — either
#  way money moves through Vault. The balance header and Deposit/Withdraw buttons
#  (amounts from coop.bank.amounts in config.yml) are placed by code; this is the frame.
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
#    slot options: silent: true — suppress this menu’s click sound for one slot, for a
#      button whose destination plays its own open sound (the two land together otherwise)
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8Skyblock &7» &fCoop Bank"
rows: 6

# Sounds this menu plays. Delete a key to silence it, or set enabled: false.
#   open  - when the menu is opened
#   click - when a button is clicked
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  click:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  # ── footer (balance + deposit/withdraw buttons are placed by code) ──
  - item: arrow name:"&7« Back"
    lore:
      - "&7Return to the bank menu."
    row: 6
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: bank-hub

  - item: barrier name:"&cClose"
    lore:
      - "&7Close this menu."
    row: 6
    column: 6
    left-click:
      - id: close
