# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Main Menu   (/is menu)
# ═══════════════════════════════════════════════════════════════════════════════
#  The Skyblock hub — every other menu opens from here.
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
#    slot options: silent: true — suppress this menu’s click sound for one slot, for a
#      button whose destination plays its own open sound (the two land together otherwise)
#    (sounds are configured per menu in the sounds: block below)
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8Skyblock"
rows: 6

# Sounds this menu plays. Delete a key to silence it, or set enabled: false.
#   open  - when the menu is opened
#   click - when a button is clicked
sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  click:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.2

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  # ── header ──
  - item: player_head head:%player% name:"&6&l%player%'s Skyblock"
    lore:
      - "&7Your per-island Skyblock hub."
      - ""
      - "&7Has island: &e%has_island%"
    row: 1
    column: 5

  # ── core actions ──
  - item: grass_block name:"&a&lCreate Island"
    lore:
      - "&7Start a fresh island."
      - ""
      - "&eClick to create!"
    row: 2
    column: 2
    left-click:
      - id: player_command
        args:
          command: "is create"

  - item: ender_pearl name:"&a&lGo to Your Island"
    lore:
      - "&7Teleport to your island home."
      - ""
      - "&eClick to travel!"
    row: 2
    column: 4
    left-click:
      - id: player_command
        args:
          command: "is home"

  - item: compass name:"&b&lVisit an Island"
    lore:
      - "&7Browse and visit other islands."
      - ""
      - "&eClick to browse!"
    row: 2
    column: 6
    left-click:
      - id: open_menu
        args:
          menu: visit

  - item: nether_star name:"&6&lIsland Level"
    lore:
      - "&7View your island level and"
      - "&7the server leaderboard."
      - ""
      - "&eClick to view!"
    row: 2
    column: 8
    left-click:
      - id: open_menu
        args:
          menu: level

  # ── progression & management ──
  - item: nether_star name:"&d&lProfiles"
    lore:
      - "&7Switch between your profiles"
      - "&7(Solo, Coop, Ironman)."
      - ""
      - "&eClick to manage!"
    row: 4
    column: 2
    left-click:
      - id: open_menu
        args:
          menu: profiles

  - item: anvil name:"&6&lIsland Upgrades"
    lore:
      - "&7Expand your island's size,"
      - "&7guest limit, and coop slots."
      - ""
      - "&eClick to upgrade!"
    row: 4
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: upgrades

  - item: comparator name:"&e&lIsland Settings"
    lore:
      - "&7Privacy and visitor rules."
      - ""
      - "&eClick to configure!"
    row: 4
    column: 6
    left-click:
      - id: open_menu
        args:
          menu: settings

  - item: chest name:"&b&lManage Island"
    lore:
      - "&7Set spawns, clear visitors,"
      - "&7and manage your coop."
      - ""
      - "&eClick to manage!"
    row: 4
    column: 8
    left-click:
      - id: open_menu
        args:
          menu: manage

  # ── footer ──
  - item: barrier name:"&cClose"
    lore:
      - "&7Close this menu."
    row: 6
    column: 5
    left-click:
      - id: close

  - item: tnt name:"&4&lDelete Island"
    lore:
      - "&7Permanently delete your island."
      - ""
      - "&cThis cannot be undone."
    row: 6
    column: 9
    left-click:
      - id: open_menu
        args:
          menu: confirm-delete
