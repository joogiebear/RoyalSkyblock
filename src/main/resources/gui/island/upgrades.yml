# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalSkyblock  ·  Island Upgrades
# ═══════════════════════════════════════════════════════════════════════════════
#  A slot with `content: <upgrade-key>` renders that upgrade's live icon (current /
#  next tier, cost, skip cost, timer) — pin them at any row/column. Left-click an
#  upgrade to start it, right-click to skip an in-progress one. Keys come from
#  upgrades.yml (size / guest-limit / coop-slots).
#
#  RoyalSkyblock's own menu engine (not eco/libreforge):
#    rows 1–6 · mask: 1 = filler pane, 0 = dynamic slot · slots placed by row/column
#    click ids: open_menu · close · player_command · console_command · message · play_sound
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8Skyblock &7» &fUpgrades"
rows: 6

pages:
  - page: 1
    mask:
      items:
        - black_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  # ── the upgrades (pinned; rearrange freely) ──
  - content: size
    row: 3
    column: 2
  - content: guest-limit
    row: 3
    column: 4
  - content: coop-slots
    row: 3
    column: 6
  - content: generator
    row: 3
    column: 8

  # ── footer ──
  - item: arrow name:"&7« Back"
    lore:
      - "&7Return to the main menu."
    row: 6
    column: 4
    left-click:
      - id: open_menu
        args:
          menu: main

  - item: barrier name:"&cClose"
    lore:
      - "&7Close this menu."
    row: 6
    column: 6
    left-click:
      - id: close
